name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: nix eval (all configs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      # eval every machine + home build derivation.
      - name: nix eval all checks
        run: |
          nix eval --no-eval-cache --raw '.#checks' --apply '
            checks:
              builtins.concatStringsSep "\n" (
                builtins.concatMap (system:
                  map (drv: drv.drvPath) (builtins.attrValues checks.${system})
                ) (builtins.attrNames checks)
              )
          '

  format:
    name: treefmt (formatting)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: check formatting
        run: nix fmt -- --ci
